name: Build on Push

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  upload-installer:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: List installer files
        run: ls -lh GitBackup-Setup-*-x64.exe

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: GitBackup-Setup
          path: GitBackup-Setup-*-x64.exe
          retention-days: 30